# Jetty XML files loaded (in order) by JettyServerBean for the web console.
# jettyXmlFiles set up the Server/thread pool/byte buffers and wrap the handler
# tree with security; jetty-webapps.xml (webAppsContext) is applied last.
jettyXmlFiles=jetty-bytebufferpool.xml,jetty-threadpool.xml,jetty.xml,jetty-security.xml
jettyHttpXmlFiles=jetty-http.xml
httpEnabled=true
httpsEnabled=false
# Ephemeral port for tests to avoid collisions.
jetty.http.port=0
